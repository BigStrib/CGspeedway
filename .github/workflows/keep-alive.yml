name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install @supabase/supabase-js
      - run: |
          node -e "
            const { createClient } = require('@supabase/supabase-js');
            const supabase = createClient('${{ secrets.SUPABASE_URL }}', '${{ secrets.SUPABASE_SERVICE_KEY }}');
            async function ping() {
              const { error } = await supabase.from('expenses').select('*').limit(1);
              if (error) console.error('Ping failed:', error);
              else console.log('Ping successful!');
            }
            ping();
          "
