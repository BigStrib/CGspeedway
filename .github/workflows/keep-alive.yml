name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC daily
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run keep-alive script (Read-Only)
        run: |
          node -e "
            const { createClient } = require('@supabase/supabase-js');
            const supabase = createClient('${{ secrets.SUPABASE_URL }}', '${{ secrets.SUPABASE_SERVICE_KEY }}', {
              realtime: { enabled: false }
            });

            async function ping() {
              console.log('Checking database status...');
              // This is a READ-ONLY query. It does not modify your data.
              const { count, error } = await supabase
                .from('profiles')
                .select('*', { count: 'exact', head: true });
              
              if (error) {
                console.error('Ping failed:', error);
                process.exit(1);
              } else {
                console.log('Ping successful! Database is active. Total profiles detected:', count);
              }
            }
            ping();
          "
